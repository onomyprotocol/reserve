syntax = "proto3";
package reserve.reserve;

import "gogoproto/gogo.proto";

option go_package = "reserve/x/reserve/types";

// Params defines the parameters for the module.
message Params {
  option (gogoproto.goproto_stringer) = false;
  
  string marketCollateral = 1 [(gogoproto.moretags) = "yaml:\"market_collateral\""];
  string reserveCollateral = 2 [(gogoproto.moretags) = "yaml:\"reserve_collateral\""];
  string collateralDeposit = 3 [(gogoproto.moretags) = "yaml:\"collateral_deposit\""];
}
