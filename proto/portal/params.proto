syntax = "proto3";
package reserve.portal;

import "gogoproto/gogo.proto";

option go_package = "reserve/x/portal/types";

// Params defines the parameters for the module.
message Params {
  option (gogoproto.goproto_stringer) = false;
  
  string marketChannel = 1 [(gogoproto.moretags) = "yaml:\"market_channel\""];
  string providerChannel = 2 [(gogoproto.moretags) = "yaml:\"provider_channel\""];
}
